<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chọn đề thi thử tiếng Hàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans KR", "ui-sans-serif", "system-ui", "Segoe UI", "Arial", "sans-serif"],
              korean: ["Noto Sans KR", "Inter", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-[#FFF8EE] font-sans text-[#262422]">
    <div class="min-h-screen">
      <header class="sticky top-0 z-20 border-b border-[#D6D3CD] bg-white/95 backdrop-blur">
        <div class="mx-auto flex max-w-[1500px] flex-col gap-2 px-4 py-3 md:flex-row md:items-center md:justify-between md:px-5 md:py-5">
          <a href="./index.html" class="text-lg font-extrabold tracking-tight text-[#2F5D50]">Korean Study</a>
          <nav class="flex flex-wrap items-center justify-center gap-2 text-sm font-bold md:justify-start">
            <a class="h-10 rounded-lg border border-[#D6D3CD] bg-white px-3 py-2 text-[#262422] hover:bg-[#F5F4F0] md:h-11 md:px-4 md:py-2.5" href="./index.html">Trang chủ</a>
            <a class="h-10 rounded-lg border border-[#D6D3CD] bg-white px-3 py-2 text-[#262422] hover:bg-[#F5F4F0] md:h-11 md:px-4 md:py-2.5" href="./vocabulary.html">Từ vựng</a>
            <a class="h-10 rounded-lg border border-[#D6D3CD] bg-white px-3 py-2 text-[#262422] hover:bg-[#F5F4F0] md:h-11 md:px-4 md:py-2.5" href="./grammar.html">Ngữ pháp</a>
            <a class="h-10 rounded-lg bg-[#2F5D50] px-3 py-2 text-white md:h-11 md:px-4 md:py-2.5" href="./exam-start.html" aria-current="page">Thi thử</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto max-w-7xl px-3 py-4 md:px-5 md:py-6">
      <section class="grid gap-4 py-2 md:gap-8 lg:grid-cols-[minmax(0,1fr)_380px]">
        <div class="rounded-2xl border border-[#D9CBB8] bg-white p-4 shadow-sm md:p-8">
          <div class="inline-flex -rotate-1 bg-[#F6D365] px-4 py-2 text-sm font-extrabold">Mock exam setup</div>
          <h1 class="mt-5 text-2xl font-extrabold leading-tight sm:text-3xl md:text-5xl">Chọn đề, đặt thời gian, rồi bắt đầu làm bài.</h1>
          <p class="mt-4 max-w-2xl text-sm font-medium leading-6 text-[#6B625C] md:text-base md:leading-7">
            Khi bắt đầu, trang làm bài sẽ tự lưu thời gian còn lại và đáp án đã chọn trong session của trình duyệt.
          </p>

          <div id="resumePanel" class="mt-6 hidden rounded-xl border border-[#2F5D50] bg-[#EEF6F2] p-4"></div>

          <div class="mt-7 grid gap-5">
            <label class="grid gap-2">
              <span class="text-sm font-extrabold">Mã đề</span>
              <select id="examSelect" class="h-11 rounded-lg border border-[#D6D3CD] bg-white px-4 text-sm font-bold shadow-sm focus:border-[#2F5D50] focus:outline-none focus:ring-4 focus:ring-[#2F5D50]/10"></select>
            </label>

            <div>
              <div class="text-sm font-extrabold">Thời gian làm bài</div>
              <div class="mt-3 grid grid-cols-1 gap-2 sm:grid-cols-3 sm:gap-3">
                <button type="button" class="duration-option rounded-lg border border-[#D6D3CD] bg-white px-4 py-4 text-left font-extrabold hover:border-[#2F5D50] hover:bg-[#F5F4F0]" data-minutes="30">30 phút</button>
                <button type="button" class="duration-option rounded-lg border border-[#D6D3CD] bg-white px-4 py-4 text-left font-extrabold hover:border-[#2F5D50] hover:bg-[#F5F4F0]" data-minutes="45">45 phút</button>
                <button type="button" class="duration-option rounded-lg border border-[#D6D3CD] bg-white px-4 py-4 text-left font-extrabold hover:border-[#2F5D50] hover:bg-[#F5F4F0]" data-minutes="60">60 phút</button>
              </div>
              <label class="mt-3 grid gap-2 sm:max-w-xs">
                <span class="text-xs font-bold text-[#6B625C]">Tùy chọn phút</span>
                <input id="customDurationInput" class="h-11 rounded-lg border border-[#D6D3CD] bg-white px-4 text-sm font-bold shadow-sm focus:border-[#2F5D50] focus:outline-none focus:ring-4 focus:ring-[#2F5D50]/10" type="number" min="5" max="180" step="5" value="45" />
              </label>
            </div>

            <button id="startExam" class="h-11 rounded-lg bg-[#2F5D50] px-5 text-sm font-extrabold text-white hover:bg-[#254C42] active:translate-y-px">Bắt đầu làm bài</button>
          </div>
        </div>

        <aside class="h-fit rounded-2xl border border-[#D9CBB8] bg-white p-4 shadow-sm md:p-5">
          <div class="text-sm font-extrabold text-[#2F5D50]">Thông tin đề</div>
          <div id="examSummary" class="mt-4 grid gap-3 text-sm text-[#6B625C]"></div>
        </aside>
      </section>
      </main>
    </div>

    <script src="./exam-start.js"></script>
  </body>
</html>
