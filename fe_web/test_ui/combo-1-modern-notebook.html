<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Combo 1 - Modern Digital Notebook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","Noto Sans KR","system-ui","sans-serif"]}}}}</script>
  </head>
  <body class="bg-[#FFFDF7] font-sans text-[#202124]">
    <main class="mx-auto grid min-h-screen max-w-7xl gap-6 px-5 py-6 lg:grid-cols-[280px_1fr]">
      <aside class="h-fit rounded-2xl border border-[#E7E1D7] bg-white p-5 shadow-sm">
        <a href="./index.html" class="text-sm font-semibold text-[#3454D1]">← 6 combo</a>
        <h1 class="mt-5 text-2xl font-bold leading-tight">Sổ luyện tiếng Hàn</h1>
        <p class="mt-2 text-sm leading-6 text-[#667085]">Bài 03 · Quốc tịch và nghề nghiệp</p>
        <div class="mt-6 space-y-3">
          <div class="rounded-xl bg-[#EEF3FF] p-4">
            <p class="text-xs font-semibold uppercase text-[#3454D1]">Tiến độ hôm nay</p>
            <div class="mt-3 h-2 rounded-full bg-white"><div class="h-2 w-[68%] rounded-full bg-[#3454D1]"></div></div>
            <p class="mt-2 text-sm font-semibold">17/25 câu</p>
          </div>
          <button class="h-11 w-full rounded-xl bg-[#3454D1] text-sm font-semibold text-white">Tiếp tục học</button>
          <button class="h-11 w-full rounded-xl border border-[#E7E1D7] bg-[#FFFDF7] text-sm font-semibold">Xem câu sai</button>
        </div>
      </aside>

      <section class="space-y-5">
        <div class="rounded-2xl border border-[#E7E1D7] bg-white p-6 shadow-sm">
          <div class="flex flex-wrap items-center justify-between gap-3 border-b border-[#E7E1D7] pb-4">
            <div>
              <span class="rounded-r-xl bg-[#F4C95D] px-4 py-2 text-sm font-bold">Bookmark · Part 1</span>
              <h2 class="mt-5 text-3xl font-bold">Chọn đáp án đúng</h2>
            </div>
            <p class="rounded-full bg-[#CFE8D6] px-4 py-2 text-sm font-semibold">Easy · Grammar</p>
          </div>

          <div class="mt-6 rounded-xl border border-[#E7E1D7] bg-[linear-gradient(#ffffff_31px,#F3EEE5_32px)] p-6">
            <p class="text-sm font-semibold text-[#667085]">Câu 12</p>
            <p class="mt-3 text-[21px] font-semibold leading-[34px]">저는 베트남 사람<span class="border-b-4 border-[#3454D1]/40">___</span>.</p>
            <p class="mt-2 text-[15px] leading-[25px] text-[#667085]">Tôi là người Việt Nam.</p>
          </div>

          <div class="mt-5 grid gap-3 md:grid-cols-2">
            <button class="flex min-h-14 items-center gap-3 rounded-xl border border-[#3454D1] bg-[#EEF3FF] px-4 text-left"><span class="grid h-7 w-7 place-items-center rounded-full bg-[#3454D1] text-sm font-bold text-white">A</span><span class="font-semibold">입니다</span></button>
            <button class="flex min-h-14 items-center gap-3 rounded-xl border border-[#E7E1D7] bg-white px-4 text-left"><span class="grid h-7 w-7 place-items-center rounded-full border border-[#E7E1D7] text-sm font-bold">B</span><span>입니까</span></button>
            <button class="flex min-h-14 items-center gap-3 rounded-xl border border-[#E7E1D7] bg-white px-4 text-left"><span class="grid h-7 w-7 place-items-center rounded-full border border-[#E7E1D7] text-sm font-bold">C</span><span>은</span></button>
            <button class="flex min-h-14 items-center gap-3 rounded-xl border border-[#E7E1D7] bg-white px-4 text-left"><span class="grid h-7 w-7 place-items-center rounded-full border border-[#E7E1D7] text-sm font-bold">D</span><span>는</span></button>
          </div>
        </div>

        <div class="rounded-2xl border border-[#E7E1D7] bg-white p-5 shadow-sm">
          <h3 class="text-base font-bold">Vì sao đúng?</h3>
          <p class="mt-2 leading-7 text-[#667085]">Câu trần thuật giới thiệu danh từ dùng <mark class="rounded bg-[#F4C95D]/60 px-1">입니다</mark>. Dạng hỏi mới dùng <span class="border-b-2 border-[#3454D1]">입니까</span>.</p>
        </div>
      </section>
    </main>
  </body>
</html>
