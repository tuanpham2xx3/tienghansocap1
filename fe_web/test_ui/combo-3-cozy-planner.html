<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Combo 3 - Cozy Study Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Noto Sans KR","system-ui","sans-serif"]}}}}</script>
  </head>
  <body class="bg-[#FFF9F1] font-sans text-[#3C3633]">
    <main class="mx-auto max-w-7xl px-5 py-6">
      <a href="./index.html" class="text-sm font-bold text-[#5B8C70]">← 6 combo</a>
      <section class="mt-5 grid gap-5 lg:grid-cols-[1fr_360px]">
        <div>
          <div class="flex flex-wrap items-end justify-between gap-4">
            <div>
              <p class="rounded-full bg-[#FFD875] px-4 py-1 text-sm font-bold">7 ngày streak</p>
              <h1 class="mt-4 text-3xl font-bold leading-10">Kế hoạch học hôm nay</h1>
              <p class="mt-2 leading-7 text-[#756B64]">Ôn nhẹ, làm vài câu, lưu lại từ mới để mai xem lại.</p>
            </div>
            <button class="h-12 rounded-[14px] bg-[#FFD875] px-5 text-sm font-bold">Ôn lại hôm nay</button>
          </div>

          <div class="mt-6 grid gap-4 md:grid-cols-3">
            <div class="rounded-[18px] border border-[#ECDCCB] bg-white p-5"><p class="text-sm font-bold text-[#756B64]">Đã học</p><p class="mt-2 text-3xl font-bold">42m</p></div>
            <div class="rounded-[18px] border border-[#ECDCCB] bg-white p-5"><p class="text-sm font-bold text-[#756B64]">Câu đúng</p><p class="mt-2 text-3xl font-bold">18/22</p></div>
            <div class="rounded-[18px] border border-[#ECDCCB] bg-white p-5"><p class="text-sm font-bold text-[#756B64]">Từ mới</p><p class="mt-2 text-3xl font-bold">9</p></div>
          </div>

          <div class="mt-5 rounded-[18px] border border-[#ECDCCB] bg-white p-6">
            <div class="flex flex-wrap items-center justify-between gap-3">
              <h2 class="text-xl font-bold">Flash practice</h2>
              <span class="rounded-full bg-[#F6B39A]/45 px-3 py-1 text-sm font-bold">Bài 03</span>
            </div>
            <div class="mt-5 rounded-2xl bg-[#FFF9F1] p-6">
              <p class="text-sm font-bold text-[#5B8C70]">Chọn nghĩa đúng</p>
              <p class="mt-3 text-[32px] font-bold">도서관</p>
              <p class="mt-1 text-[#756B64]">/doseogwan/</p>
            </div>
            <div class="mt-4 grid gap-3 md:grid-cols-2">
              <button class="h-14 rounded-[14px] border border-[#ECDCCB] bg-white font-semibold">Công viên</button>
              <button class="h-14 rounded-[14px] border border-[#5B8C70] bg-[#ECF5EF] font-semibold">Thư viện</button>
              <button class="h-14 rounded-[14px] border border-[#ECDCCB] bg-white font-semibold">Trường học</button>
              <button class="h-14 rounded-[14px] border border-[#ECDCCB] bg-white font-semibold">Cửa hàng</button>
            </div>
          </div>
        </div>

        <aside class="space-y-4">
          <div class="rounded-[18px] border border-[#ECDCCB] bg-[#FFF2B8] p-5">
            <h3 class="text-lg font-bold">Việc cần làm</h3>
            <div class="mt-4 space-y-3 text-sm font-semibold">
              <label class="flex gap-3"><input checked type="checkbox" /> Ôn 10 từ mới</label>
              <label class="flex gap-3"><input checked type="checkbox" /> Làm Part 1</label>
              <label class="flex gap-3"><input type="checkbox" /> Chữa câu sai</label>
            </div>
          </div>
          <div class="rounded-[18px] border border-[#ECDCCB] bg-white p-5">
            <h3 class="text-lg font-bold">Lịch tuần</h3>
            <div class="mt-4 grid grid-cols-7 gap-2 text-center text-sm font-bold">
              <span class="rounded-xl bg-[#5B8C70] py-3 text-white">T2</span><span class="rounded-xl bg-[#5B8C70] py-3 text-white">T3</span><span class="rounded-xl bg-[#FFD875] py-3">T4</span><span class="rounded-xl bg-[#FFF9F1] py-3">T5</span><span class="rounded-xl bg-[#FFF9F1] py-3">T6</span><span class="rounded-xl bg-[#FFF9F1] py-3">T7</span><span class="rounded-xl bg-[#FFF9F1] py-3">CN</span>
            </div>
          </div>
        </aside>
      </section>
    </main>
  </body>
</html>
