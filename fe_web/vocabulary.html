<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Học từ vựng tiếng Hàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "Noto Sans KR", "system-ui", "sans-serif"],
              korean: ["Noto Sans KR", "Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      @media (prefers-reduced-motion: no-preference) {
        .study-shell {
          animation: study-fade 180ms ease-out;
        }

        .study-card {
          transition:
            transform 180ms ease,
            box-shadow 180ms ease,
            border-color 180ms ease,
            background-color 180ms ease;
        }

        .study-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 14px 34px rgb(38 36 34 / 0.08);
        }

        .study-card-content {
          animation: card-content-in 180ms ease-out;
        }

        .feedback-in {
          animation: feedback-in 160ms ease-out;
        }

        .tap-button {
          transition:
            transform 120ms ease,
            background-color 120ms ease,
            border-color 120ms ease;
        }

        .tap-button:active {
          transform: translateY(1px);
        }

        .circle-button {
          transition:
            transform 140ms ease,
            background-color 140ms ease,
            border-color 140ms ease,
            color 140ms ease,
            box-shadow 140ms ease;
        }

        .circle-button:hover {
          border-color: #2F5D50;
          background: #EEF6F2;
          box-shadow: 0 10px 22px rgb(38 36 34 / 0.08);
        }

        .circle-button:active {
          background: #DDEFE7;
        }

        .speaker-glyph {
          font-family: "Segoe UI Symbol", "Noto Sans KR", system-ui, sans-serif;
          font-size: 21px;
          line-height: 1;
          transform: translateX(1px);
        }
      }

      @keyframes study-fade {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes card-content-in {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes feedback-in {
        from {
          opacity: 0;
          transform: translateY(-3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body class="bg-[#F5F4F0] font-sans text-[#262422]">
    <div class="min-h-screen">
      <header class="sticky top-0 z-20 border-b border-[#D6D3CD] bg-white/95 backdrop-blur">
        <div class="mx-auto flex max-w-[1500px] flex-col gap-2 px-4 py-3 md:flex-row md:items-center md:justify-between md:px-5 md:py-5">
          <a href="./index.html" class="text-lg font-extrabold tracking-tight text-[#2F5D50]">Korean Study</a>
          <nav class="flex flex-wrap items-center justify-center gap-2 text-sm font-bold md:justify-start">
            <a class="h-10 rounded-lg border border-[#D6D3CD] bg-white px-3 py-2 text-[#262422] hover:bg-[#F5F4F0] md:h-11 md:px-4 md:py-2.5" href="./index.html">Trang chủ</a>
            <a class="h-10 rounded-lg bg-[#2F5D50] px-3 py-2 text-white md:h-11 md:px-4 md:py-2.5" href="./vocabulary.html" aria-current="page">Từ vựng</a>
            <a class="h-10 rounded-lg border border-[#D6D3CD] bg-white px-3 py-2 text-[#262422] hover:bg-[#F5F4F0] md:h-11 md:px-4 md:py-2.5" href="./grammar.html">Ngữ pháp</a>
            <a class="h-10 rounded-lg border border-[#D6D3CD] bg-white px-3 py-2 text-[#262422] hover:bg-[#F5F4F0] md:h-11 md:px-4 md:py-2.5" href="./exam-start.html">Thi thử</a>
          </nav>
        </div>
      </header>

      <main class="mx-auto grid max-w-[1500px] gap-4 px-4 py-4 md:px-5 md:py-6 lg:grid-cols-[320px_minmax(0,1fr)]">
        <aside class="h-fit rounded-xl border border-[#D6D3CD] bg-white p-4 shadow-sm md:p-5">
          <div class="text-sm font-bold">Khu học</div>
          <div id="sectionTabs" class="mt-3 grid gap-2"></div>

          <div class="mt-5 border-t border-[#D6D3CD] pt-4">
            <div class="text-sm font-bold">Chế độ</div>
            <div id="modeTabs" class="mt-3 grid gap-2"></div>
          </div>

          <div id="lessonControlPanel" class="mt-5 border-t border-[#D6D3CD] pt-4">
            <label for="lessonSelect" class="text-sm font-bold">Bài học</label>
            <select id="lessonSelect" class="mt-3 h-11 w-full rounded-lg border border-[#D6D3CD] bg-white px-3 text-sm shadow-sm focus:border-[#2F5D50] focus:outline-none focus:ring-4 focus:ring-[#2F5D50]/10"></select>
          </div>

        </aside>

        <section id="app" class="min-w-0 rounded-xl border border-[#D6D3CD] bg-white p-4 shadow-sm md:min-h-[620px] md:p-6"></section>
      </main>
    </div>

    <template id="loadingTemplate">
      <div class="space-y-4">
        <div class="h-6 w-48 rounded-lg bg-[#E8E2D8]"></div>
        <div class="h-64 rounded-xl bg-[#F5F4F0]"></div>
      </div>
    </template>

    <script src="./vocabulary.js"></script>
  </body>
</html>
